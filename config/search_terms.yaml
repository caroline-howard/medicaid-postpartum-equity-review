# Final PubMed search strategy selected after refinement testing.
academic_search_string: '(Medicaid[Title/Abstract] OR CHIP[Title/Abstract]) AND (postpartum[Title/Abstract] OR post-partum[Title/Abstract] OR postnatal[Title/Abstract]) AND (coverage[Title/Abstract] OR eligibility[Title/Abstract] OR extension[Title/Abstract] OR "continuous coverage"[Title/Abstract] OR churn[Title/Abstract] OR redetermination[Title/Abstract])'
date_range:
  start_year: 2014
  end_year: 2026
geography: United States
main_automated_academic_source: PubMed
exploratory_sources_not_in_main_prisma:
  - OpenAlex
policy_scan_terms:
  - Medicaid postpartum coverage extension state plan amendment
  - Section 1115 postpartum waiver
  - Medicaid postpartum extension tracker
  - postpartum Medicaid eligibility maternal health equity
  - 12-month postpartum Medicaid coverage maternal health access
  - Medicaid postpartum coverage continuity care equity
record_volume_guidance:
  target_initial_candidates_before_deduplication: approximately 100-400 records
  potentially_too_narrow_threshold_combined_pubmed_openalex: 50
  potentially_too_broad_threshold_combined_pubmed_openalex: 750
  feasible_portfolio_final_core_sources: approximately 10-25 core evidence sources
  note: Do not force final inclusion counts, exclude records to hit a target, or include weak records to reach a target.
